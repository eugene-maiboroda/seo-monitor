spring.application.name=robot-SEO-monitor
server.host=5.199.138.20


# SERVER
server.forward-headers-strategy=framework
server.port=${PORT:8080}
server.servlet.context-path=/api

# DATASOURCE
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# SCHEDULER
app.scheduler.enabled=true
app.scheduler.fixed-rate-ms=60000

# NOTIFICATION
app.notification.webhook-url=https://n8n.javik.online/webhook/447ed3a2-9e28-478d-b29c-2597d6d19015
#app.notification.webhook-url=https://n8n.javik.online/webhook-test/447ed3a2-9e28-478d-b29c-2597d6d19015